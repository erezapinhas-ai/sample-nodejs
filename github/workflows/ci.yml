name: CI & DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SAST Scan (Code & Dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image Locally
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sample-nodejs:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/sample-nodejs:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/sample-nodejs:latest

      - name: Container Image Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/sample-nodejs:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image to Docker Hub
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sample-nodejs:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sample-nodejs:latest
